<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Daftar Kontak</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>📂 Aplikasi Daftar Kontak</h2>
        
        <!-- Form Input -->
        <div class="card">
            <h3 id="form-title">Tambah Kontak Baru</h3>
            <form id="contact-form">
                <input type="hidden" id="contact-id">
                
                <div class="form-group">
                    <label>Nama Lengkap *</label>
                    <input type="text" id="nama" required>
                </div>
                
                <div class="form-group">
                    <label>Nomor HP *</label>
                    <input type="text" id="nomor_hp" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>
                
                <div class="form-group">
                    <label>Alamat</label>
                    <textarea id="alamat" rows="2"></textarea>
                </div>
                
                <!-- Tombol aksi diletakkan di dalam grid form-actions -->
                <div class="form-actions">
                    <button type="submit" id="btn-submit" class="btn btn-primary">Simpan Kontak</button>
                    <button type="button" id="btn-cancel" class="btn btn-secondary" style="display:none;" onclick="resetForm()">Batal</button>
                </div>
            </form>
        </div>

        <!-- Fitur Cari -->
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Cari berdasarkan nama atau no HP..." oninput="fetchKontak()">
        </div>

        <!-- Tabel Tampilan Data -->
        <div class="table-container">
            <h3>Daftar Kontak Terdaftar</h3>
            <table>
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th>Nomor HP</th>
                        <th>Email</th>
                        <th>Alamat</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="contact-table-body">
                    <!-- Data dimasukkan via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Menghubungkan ke logika JavaScript eksternal -->
    <script src="script.js"></script>
</body>
</html>
